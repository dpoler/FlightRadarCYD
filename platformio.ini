; PlatformIO Project Configuration File
; FlightRadarCYD - Live Aircraft Radar

; ---------------------------------------------------------------------------
; CYD (Cheap Yellow Display) — ESP32 + ILI9341 320x240 + XPT2046 resistive touch
; ---------------------------------------------------------------------------
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
build_src_filter = +<*> -<main_p4.cpp> -<hal/>
lib_deps =
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    moononournation/GFX Library for Arduino
    bblanchon/ArduinoJson@^6

; ---------------------------------------------------------------------------
; JC1060P470C — ESP32-P4 + JD9165 1024x600 MIPI DSI + GT911 capacitive touch
; Requires pioarduino fork for ESP32-P4 PlatformIO support.
; Run c6_updater once first to ensure ESP32-C6 WiFi coprocessor is on v2.11.6.
; ---------------------------------------------------------------------------
[env:esp32p4]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.37
board = esp32-p4-evboard
framework = arduino
monitor_speed = 115200
board_build.psram = enabled
board_build.filesystem = littlefs
build_src_filter = +<*> -<main.cpp>
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Isrc/hal
lib_deps =
    moononournation/GFX Library for Arduino
    bblanchon/ArduinoJson@^6
